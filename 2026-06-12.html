function renderMatchCard(m) {
  const kickoff = new Date(m.kickoff_utc).toLocaleString("en-US",
    {timeZone: localTz, weekday: "short", hour: "2-digit", minute: "2-digit"});
  const variants = DATA.variant_order.filter(v => m.variants[v]);
  const implied = m.implied || {};
  const summaryRows = [
    ["Bookmakers", implied.home, implied.draw, implied.away],
    ...variants.map(v => [`Ensemble · ${v}`,
      m.variants[v].ensemble.home, m.variants[v].ensemble.draw, m.variants[v].ensemble.away]),
  ].map(r => `<tr><td>${r[0]}</td>
    <td>${fmtPct(r[1])}</td><td>${fmtPct(r[2])}</td><td>${fmtPct(r[3])}</td></tr>`).join("");

  const modelIds = [...new Set(variants.flatMap(v =>
    m.variants[v].per_model.map(p => p.model_id)))].sort();
  const divergenceRows = modelIds.map(mid => {
    const cells = variants.map(v => {
      const row = (m.variants[v].per_model || []).find(p => p.model_id === mid);
      return row ? row.home.toFixed(2) : "—";
    });
    return `<tr><td><code>${mid}</code></td>` + cells.map(c => `<td>${c}</td>`).join("") + "</tr>";
  }).join("");

  const perVariantTables = variants.map(v => {
    const rows = (m.variants[v].per_model || []).map(p =>
      `<tr><td><code>${p.model_id}</code></td>
       <td>${p.home.toFixed(2)}</td><td>${p.draw.toFixed(2)}</td><td>${p.away.toFixed(2)}</td>
       <td>${p.btts_yes.toFixed(2)}</td><td>${p.over_25.toFixed(2)}</td>
       <td>${p.most_likely}</td></tr>`).join("");
    return `<p><span class="pill ${v}">${v}</span></p>
      <table><thead><tr><th>Model</th><th>H</th><th>D</th><th>A</th><th>BTTS</th><th>O 2.5</th><th>Score</th></tr></thead>
      <tbody>${rows}</tbody></table>`;
  }).join("");

  const quotes = (m.reasoning_quotes || []).map(q =>
    `<li><code>${q.model_id}</code> — ${escapeHtml(q.quote)}</li>`).join("");

  return `
    <details class="match" open>
      <summary>${m.home_team} vs ${m.away_team} <small style="color:var(--pico-muted-color)">— ${kickoff}</small></summary>
      <h4>Summary</h4>
      <table>
        <thead><tr><th></th><th>Home</th><th>Draw</th><th>Away</th></tr></thead>
        <tbody>${summaryRows}</tbody>
      </table>
      <h4>Variant divergence — home probability per model</h4>
      <table>
        <thead><tr><th>Model</th>${variants.map(v => `<th>${v}</th>`).join("")}</tr></thead>
        <tbody>${divergenceRows}</tbody>
      </table>
      <h4>Full predictions per variant</h4>
      ${perVariantTables}
      ${quotes ? `<h4>Reasoning highlights (with_context, run 0)</h4><ul>${quotes}</ul>` : ""}
    </details>
  `;
}

function fmtPct(v) { return v == null ? "—" : (v * 100).toFixed(0) + "%"; }
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c =>
    ({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[c]);
}

  const body = rows.map(r => {

      const won = r.was_correct;

      const pnl = won ? (r.best_decimal_odds - 1) * stake : -stake;
      return `<tr>
        <td>${r.home_team} ${r.home_score}-${r.away_score} ${r.away_team}</td>
        <td>${labelMarket(r.market)}</td>
        <td><strong>${r.side}</strong></td>
        <td>${r.best_decimal_odds.toFixed(2)}</td>
        <td class="${won ? 'ok' : 'bad'}">${won ? '✅ WON' : '❌ LOST'}</td>
        <td class="${pnl >= 0 ? 'ok' : 'bad'}">${pnl >= 0 ? '+' : ''}€${pnl.toFixed(2)}</td>
      </tr>`;
    }
    return `<tr>
      <td>${r.home_team} vs ${r.away_team}</td>
      <td>${labelMarket(r.market)}</td>
      <td><strong>${r.side}</strong></td>
      <td>${r.best_decimal_odds.toFixed(2)}</td>
      <td>${(r.implied_prob ? r.implied_prob*100 : (100/r.best_decimal_odds)).toFixed(1)}%</td>
      <td>${(r.ensemble_prob*100).toFixed(1)}%</td>
      <td><strong>${r.ensemble_ev*100 >= 0 ? '+' : ''}${(r.ensemble_ev*100).toFixed(1)}%</strong></td>
      <td>${r.agreement || '—'}</td>
      <td>€${(r.kelly_stake_eur||0).toFixed(2)}</td>
    </tr>`;
  }).join("");
  return `<table><thead>${header}</thead><tbody>${body}</tbody></table>`;
}
document.getElementById("value-bets").innerHTML = renderBetTable(DATA.value_bets, "today");
document.getElementById("consensus").innerHTML = renderBetTable(
  (DATA.consensus || []).map(c => ({...c, best_decimal_odds: c.implied_prob ? 1/c.implied_prob : 0,
                                     ensemble_ev: c.ensemble_prob - (c.implied_prob||0),
                                     kelly_stake_eur: 0})),
  "today"
);
document.getElementById("pending").innerHTML = renderBetTable(DATA.pending_bets, "today");
document.getElementById("settled").innerHTML = renderBetTable(DATA.settled_bets, "settled");

// ---- Costs ----
document.getElementById("cost-table").innerHTML = !DATA.costs.length
  ? "<p><em>No spend recorded.</em></p>"
  : `<table>
      <thead><tr><th>Variant</th><th>Model</th><th>Calls</th><th>Spend (USD)</th>
        <th>Prompt</th><th>Output</th><th>Thinking</th></tr></thead>
      <tbody>${DATA.costs.map(c => `<tr>
        <td><span class="pill ${c.variant}">${c.variant}</span></td>
        <td><code>${c.model_id}</code></td>
        <td>${c.calls}</td>
        <td>$${(c.spent_usd||0).toFixed(4)}</td>
        <td>${c.prompt_tokens.toLocaleString()}</td>
        <td>${c.completion_tokens.toLocaleString()}</td>
        <td>${(c.thinking_tokens||0).toLocaleString()}</td>
      </tr>`).join("")}</tbody>
    </table>`;

// ---- Charts ----
if (DATA.cumulative_pnl && DATA.cumulative_pnl.length) {
  const ctx = document.getElementById("chart-pnl").getContext("2d");
  const allDays = [...new Set(DATA.cumulative_pnl.flatMap(s => s.points.map(p => p.day)))].sort();
  const datasets = DATA.cumulative_pnl.map(s => ({
    label: `${s.model_id} (${s.variant})`,
    data: allDays.map(d => {
      const pt = [...s.points].reverse().find(p => p.day <= d);
      return pt ? pt.cumulative : 0;
    }),
    tension: 0.2, fill: false,
  }));
  new Chart(ctx, {
    type: "line",
    data: { labels: allDays, datasets },
    options: { responsive: true, maintainAspectRatio: false,
      plugins: { title: { display: true, text: "Cumulative realized P/L per (model, variant)" }, legend: { position: "bottom" } } },
  });
} else {
  document.getElementById("chart-pnl").parentElement.style.display = "none";
}

if (DATA.daily_spend_series && DATA.daily_spend_series.length) {
  const ctx = document.getElementById("chart-spend").getContext("2d");
  new Chart(ctx, {
    type: "bar",
    data: {
      labels: DATA.daily_spend_series.map(d => d.day),
      datasets: [{
        label: "Daily LLM spend (USD)",
        data: DATA.daily_spend_series.map(d => d.spend),
        backgroundColor: "rgba(54, 162, 235, 0.7)",
        borderColor: "rgb(54, 162, 235)",
        borderWidth: 1,
        // Cap bar width so a single-point chart doesn't render as a wall
        maxBarThickness: 80,
      }],
    },
    options: { responsive: true, maintainAspectRatio: false,
      plugins: { title: { display: true, text: "Daily LLM spend (USD)" }, legend: { display: false } },
      scales: { y: { beginAtZero: true, title: { display: true, text: "USD" } } } },
  });
} else {
  document.getElementById("chart-spend").parentElement.style.display = "none";
}

</script>
</body>
</html>
